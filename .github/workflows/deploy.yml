name: Multi-Agent Hospitality CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/travel-planner:latest

  deploy-to-ec2:
    name: Deploy to Kubernetes (EC2)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/hospitality_agent_project

            echo "📥 Pull latest code"
            git pull origin main

            echo "🔐 Creating/Updating Kubernetes Secret"
            kubectl create secret generic api-secrets \
              --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "🚀 Applying Kubernetes configs"
            kubectl apply -f deployment.yaml
            kubectl apply -f service.yaml

            echo "🔄 Restarting deployment"
            kubectl rollout restart deployment travel-planner-deployment

            echo "✅ Deployment Successful!"
