apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-planner-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-planner
  template:
    metadata:
      labels:
        app: travel-planner
    spec:
      containers:
        - name: travel-planner
          image: aeshnapreyasi/travel-planner:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          
          #  Environment Variable from Kubernetes Secret
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: GROQ_API_KEY